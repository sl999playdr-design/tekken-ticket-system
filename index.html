<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Nゲージ整理券システム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><button onclick="location.href='staff.html'">スタッフ受付用画面へ</button></nav>

    <div class="lcd-panel">
        <h1>ただいまの呼出番号</h1>
        <div id="calling-now" style="font-size: 80px; color: #ffcc00; background: #333; padding: 20px; border-radius: 10px;">
            確認中...
        </div>
    </div>

    <div class="info-panel">
        <p>待ち組数: <span id="wait-count">0</span> 組</p>
        <p>推定待ち時間: 約 <span id="wait-time">0</span> 分</p>
    </div>

    <script src="script.js"></script>
    <script>
        async function update() {
            const data = await fetchSheetData();
            const calling = data.filter(d => d.status === 'call').map(d => d.id).join(' / ');
            const waiting = data.filter(d => d.status === 'resep').length;

            document.getElementById('calling-now').innerText = calling || "お待ちください";
            document.getElementById('wait-count').innerText = waiting;
            document.getElementById('wait-time').innerText = waiting * 5;
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
