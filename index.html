<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道研究部 ポータルサイト</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #fcfcfc;
        }

        header {
            width: 100%;
            line-height: 0;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- 路線図メニューエリア --- */
        .navigation-section {
            background-color: #fff;
            padding: 30px 0;
            border-bottom: 2px solid #eee;
        }

        .route-map-container {
            position: relative;
            width: 95%;         /* 画面端まで使えるように広げました */
            max-width: 1000px;  /* 元画像の横長さに合わせて上限をアップ */
            margin: 0 auto;
            line-height: 0;
        }

        .route-base-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 透過ボタン（駅番号パーツ）の設定 */
        .station-link {
            position: absolute;
            top: 50%;           /* 下地の路線の中央に合わせる */
            transform: translateY(-50%);
            width: 10%;         /* ボタンを少し小ぶりに */
            transition: opacity 0.2s, transform 0.1s;
        }

        .station-link img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ボタンの位置微調整（%を調整して駅番号に重ねる） */
        .btn-01 { left: 4%; }   /* description: 少し左へ */
        .btn-02 { left: 24.5%; } /* notify */
        .btn-03 { left: 45%; }   /* activities: ほぼ中央 */
        .btn-04 { left: 65.5%; } /* media */
        .btn-05 { left: 86%; }   /* N-gage: もっと右へ */

        .station-link:hover { opacity: 0.7; }
        .station-link:active { transform: translateY(-50%) scale(0.9); }

        /* --- メインコンテンツ --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        section {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        h2 {
            border-left: 5px solid #e67e22;
            padding-left: 15px;
            margin-top: 0;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>

<header>
    <img src="header-img.png" alt="鉄研ヘッダー">
</header>

<nav class="navigation-section">
    <div class="route-map-container">
        <img src="menu-image.png" alt="路線図ベース" class="route-base-img">
        
        <a href="#" class="station-link btn-01"><img src="description.png" alt="部活概要"></a>
        <a href="#" class="station-link btn-02"><img src="notify.png" alt="お知らせ"></a>
        <a href="#" class="station-link btn-03"><img src="activities.png" alt="活動紹介"></a>
        <a href="#" class="station-link btn-04"><img src="media.png" alt="製作作品"></a>
        <a href="monitor.html" class="station-link btn-05"><img src="N-gage.png" alt="運転体験"></a>
    </div>
</nav>

<main class="container">
    <section>
        <h2>最新の運行情報</h2>
        <p>路線図上の駅番号をタップして各コンテンツへ移動できます。</p>
    </section>
</main>

</body>
</html>
