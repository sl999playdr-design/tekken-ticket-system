<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道研究部 ポータルサイト</title>
    <style>
        /* --- 基本設定 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #fcfcfc;
            color: #333;
        }

        /* --- ヘッダー（今回は固定せず、スクロールさせる構成にしています） --- */
        header {
            width: 100%;
            line-height: 0;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- 路線図メニュー（常時表示・スマホ最適化） --- */
        .navigation-section {
            background-color: #fff;
            padding: 20px 0;
            border-bottom: 2px solid #eee;
        }

        /* 路線図の背景画像を置くコンテナ */
        .route-map-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px; /* スマホで見やすい幅 */
            margin: 0 auto;
        }

        /* ベースとなる路線図画像（文字だけの画像など） */
        .route-map-base {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 各駅のボタン（パーツ分けした画像を入れる場所） */
        .station-link {
            position: absolute;
            left: 5%; /* 画像内の駅番号の位置に合わせて調整 */
            width: 18%; /* ボタンの横幅 */
            display: block;
            transition: transform 0.1s;
        }

        .station-link img {
            width: 100%;
            height: auto;
        }

        .station-link:active {
            transform: scale(0.9); /* タップした時に少し凹む演出 */
        }

        /* 各駅の縦位置（画像に合わせて調整してください） */
        .pos-01 { top: 9%; }
        .pos-02 { top: 27%; }
        .pos-03 { top: 46%; }
        .pos-04 { top: 64%; }
        .pos-05 { top: 83%; }

        /* --- メインコンテンツ --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            background: #fff;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h2 {
            border-left: 5px solid #e67e22;
            padding-left: 15px;
            margin-top: 0;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <img src="header-img.png" alt="鉄研ヘッダー">
</header>

<nav class="navigation-section">
    <div class="route-map-wrapper">
        <img src="menu-image.png" alt="路線図" class="route-map-base">
        
        <a href="#" class="station-link pos-01">
            <img src="description.png" alt="部活概要">
        </a>
        <a href="#" class="station-link pos-02">
            <img src="notification.png" alt="お知らせ">
        </a>
        <a href="#" class="station-link pos-03">
            <img src="activities.png" alt="活動紹介">
        </a>
        <a href="#" class="station-link pos-04">
            <img src="media.png" alt="製作作品">
        </a>
        <a href="monitor.html" class="station-link pos-05">
            <img src="N-gage.png" alt="運転体験">
        </a>
    </div>
</nav>

<main class="container">
    <section>
        <h2>最新の運行情報</h2>
        <p>当サイトは鉄道研究部の活動をリアルタイムに伝えるポータルサイトです。</p>
    </section>
</main>

<div class="footer">
    &copy; 名古屋中学校・高等学校 鉄道研究部
</div>

</body>
</html>
