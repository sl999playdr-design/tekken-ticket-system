<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nゲージ運行状況モニター</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ローディングオーバーレイ（表示崩れ防止版） */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #4CAF50; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* 垂直中央 */
            align-items: center;     /* 水平中央 */
            z-index: 10000;
            transition: opacity 0.6s ease;
        }

        .loading-content {
            text-align: center;
        }

        .train-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }

        .loading-msg {
            color: white;
            font-family: "Helvetica Neue", Arial, sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 0.1em;
        }

        /* 消える時のアニメーション用クラス */
        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="viewer-mode">

    <div id="loading-overlay">
        <div class="loading-content">
            <div class="train-icon">🚃</div>
            <div class="loading-msg">通信中...</div>
        </div>
    </div>

    <nav class="top-nav">
        <button onclick="location.href='entry.html'" class="btn-entry">
            <span>🎫</span> 新規 整理券発行
        </button>
        <button id="resume-btn" class="btn-entry" style="display:none; background: #2c3e50; box-shadow: 0 4px 0 #1a252f; margin-left: 10px;">
            <span>📄</span> 自分の整理券を再表示
        </button>
    </nav>

    <main class="monitor-container">
        <div class="lcd-panel">
            <div class="lcd-header">
                <span class="lcd-label">STATUS</span>
                <span class="lcd-main-title">ただいまの呼出番号</span>
            </div>
            
            <div id="calling-now" class="lcd-number">準備中</div>
            
            <div class="lcd-footer">
                <marquee scrollamount="5">【鉄道研究部】 整理券番号が呼ばれましたら、受付までお越しください。</marquee>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="label">待ち組数</div>
                <div class="value"><span id="wait-count">0</span> <small>組</small></div>
            </div>
            <div class="status-card">
                <div class="label">推定待ち時間</div>
                <div class="value"><span id="wait-time">0</span> <small>分</small></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function initResumeButton() {
            const savedId = localStorage.getItem('my_ticket_id');
            const savedV = localStorage.getItem('my_ticket_v');
            if (savedId && savedV) {
                const btn = document.getElementById('resume-btn');
                btn.style.display = 'inline-block';
                btn.onclick = () => {
                    location.href = `issued.html?id=${savedId}&v=${encodeURIComponent(savedV)}`;
                };
            }
        }

        async function updateDisplay() {
            try {
                const data = await fetchSheetData();
                
                // 通信成功したらオーバーレイを消す
                const overlay = document.getElementById('loading-overlay');
                if (overlay) {
                    overlay.classList.add('fade-out');
                    setTimeout(() => overlay.remove(), 600);
                }

                // 呼出番号表示
                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds.join(' / ') : "お待ちください";

                // 待ち情報
                const waitingCount = data.filter(d => d.status === 'resep').length;
                document.getElementById('wait-count').innerText = waitingCount;
                document.getElementById('wait-time').innerText = waitingCount * 5;

                // 履歴有効チェック
                const savedId = localStorage.getItem('my_ticket_id');
                if (savedId) {
                    const myTicket = data.find(d => d.id === savedId);
                    if (!myTicket || myTicket.status === 'end') {
                        localStorage.removeItem('my_ticket_id');
                        localStorage.removeItem('my_ticket_v');
                        document.getElementById('resume-btn').style.display = 'none';
                    }
                }

            } catch (e) {
                console.error(e);
                const overlay = document.getElementById('loading-overlay');
                if (overlay) overlay.remove();
            }
        }

        initResumeButton();
        updateDisplay();
        setInterval(updateDisplay, 10000);
    </script>
</body>
</html>
