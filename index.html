<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道研究部 ポータルサイト</title>
    <style>
        /* --- 基本設定 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #fcfcfc;
            color: #333;
        }

        header {
            width: 100%;
            line-height: 0;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- 横並びメニュー設定 --- */
        .navigation-section {
            background-color: #fff;
            padding: 40px 0;
            border-bottom: 2px solid #eee;
            /* 横に突き抜ける場合にスクロールできるように設定 */
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .route-map-wrapper {
            position: relative;
            /* ボタン5つ + 間隔(318px * 4) を考慮した幅を確保 */
            /* ボタン1つの幅を仮に100pxとした場合、約1400px程度の領域になります */
            display: flex;
            align-items: center;
            padding: 0 50px;
            width: max-content; /* 中身に合わせて横幅を自動拡張 */
        }

        /* 各ボタンのリンク設定 */
        .station-link {
            display: block;
            transition: transform 0.1s;
            flex-shrink: 0; /* 幅が縮まないように固定 */
        }

        /* 指定の318px間隔を空ける（最後のボタン以外） */
        .station-link:not(:last-child) {
            margin-right: 318px;
        }

        .station-link img {
            /* 画像のサイズはリポジトリの元サイズに従いますが、必要に応じて width で調整してください */
            height: auto;
            display: block;
        }

        .station-link:active {
            transform: scale(0.9);
        }

        /* --- メインコンテンツ --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        section {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h2 {
            border-left: 5px solid #e67e22;
            padding-left: 15px;
            margin-top: 0;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <img src="header-img.png" alt="鉄研ヘッダー">
</header>

<nav class="navigation-section">
    <div class="route-map-wrapper">
        <a href="#" class="station-link">
            <img src="description.png" alt="部活概要">
        </a>
        <a href="#" class="station-link">
            <img src="notification.png" alt="お知らせ">
        </a>
        <a href="#" class="station-link">
            <img src="activities.png" alt="活動紹介">
        </a>
        <a href="#" class="station-link">
            <img src="media.png" alt="製作作品">
        </a>
        <a href="monitor.html" class="station-link">
            <img src="N-gage.png" alt="運転体験">
        </a>
    </div>
</nav>

<main class="container">
    <section>
        <h2>最新の運行情報</h2>
        <p>上のメニューを横にスクロールして各項目を選択してください。</p>
    </section>
</main>

<div class="footer">
    &copy; 名古屋中学校・高等学校 鉄道研究部
</div>

</body>
</html>
