<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道研究部 ポータルサイト</title>
    <style>
        /* --- 基本設定 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #fcfcfc;
        }

        header {
            width: 100%;
            line-height: 0;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- 路線図メニュー（重ね合わせ設定） --- */
        .navigation-section {
            background-color: #fff;
            padding: 20px 0;
            border-bottom: 2px solid #eee;
        }

        .route-map-container {
            position: relative; /* ボタンの配置基準 */
            width: 100%;
            max-width: 600px;   /* 下地画像の幅に合わせて調整してください */
            margin: 0 auto;
            line-height: 0;
        }

        /* 下地の画像 */
        .route-base-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 透過ボタンの共通設定 */
        .station-link {
            position: absolute;
            top: 50%;           /* 縦位置の基本（上下中央） */
            transform: translateY(-50%); /* 縦方向のズレを補正 */
            width: 12%;         /* ボタンのサイズ（少し小さめに調整） */
            transition: opacity 0.2s, transform 0.1s;
        }

        .station-link img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ホバー・タップ時の演出 */
        .station-link:hover { opacity: 0.8; }
        .station-link:active { transform: translateY(-50%) scale(0.9); }

        /* 各ボタンの横位置（％で指定。下地の駅番号の位置に合わせる） */
        /* 下地の画像を見ながら数値を微調整してください */
        .btn-01 { left: 5%; }
        .btn-02 { left: 24%; }
        .btn-03 { left: 43%; }
        .btn-04 { left: 62%; }
        .btn-05 { left: 81%; }

        /* --- メインエリア --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h2 {
            border-left: 5px solid #e67e22;
            padding-left: 15px;
            margin-top: 0;
        }
    </style>
</head>
<body>

<header>
    <img src="header-img.png" alt="鉄研ヘッダー">
</header>

<nav class="navigation-section">
    <div class="route-map-container">
        <img src="menu-image.png" alt="路線図ベース" class="route-base-img">
        
        <a href="#" class="station-link btn-01">
            <img src="description.png" alt="部活概要">
        </a>
        <a href="#" class="station-link btn-02">
            <img src="notification.png" alt="お知らせ">
        </a>
        <a href="#" class="station-link btn-03">
            <img src="activities.png" alt="活動紹介">
        </a>
        <a href="#" class="station-link btn-04">
            <img src="media.png" alt="製作作品">
        </a>
        <a href="monitor.html" class="station-link btn-05">
            <img src="N-gage.png" alt="運転体験">
        </a>
    </div>
</nav>

<main class="container">
    <section>
        <h2>最新の運行情報</h2>
        <p>路線図上の駅番号をタップして各コンテンツへ移動できます。</p>
    </section>
</main>

</body>
</html>
