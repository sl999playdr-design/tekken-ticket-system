<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運転体験 受付入力</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="entry-mode">
    <div style="padding: 10px;">
        <button onclick="location.href='monitor.html'" style="background:none; border:1px solid #ccc; cursor:pointer;">← 戻る</button>
    </div>

    <div class="selection-card">
        <header class="entry-header">
            <h2 style="margin-top:0;">Nゲージ運転体験 受付</h2>
            <p style="font-size:0.9rem; color:#666;">車両を選んで発行ボタンを押してください。</p>
        </header>

        <div class="form-group">
            <label style="font-weight:bold; display:block; margin-bottom:10px;">🚆 運転する車両</label>
            <select id="v-select" class="huge-select">
                <option value="">車両リスト読込中...</option>
            </select>
        </div>

        <div class="type-selector" style="margin-top:20px;">
            <label style="font-weight:bold; display:block; margin-bottom:10px;">運転台の種類</label>
            <div class="radio-group">
                <input type="radio" id="s" name="t" value="S" checked>
                <label for="s"><strong>特別運転台</strong><span>(マスコン操作)</span></label>
                
                <input type="radio" id="a" name="t" value="A">
                <label for="a"><strong>普通運転台</strong><span>(簡易操作)</span></label>
            </div>
        </div>

        <button id="btn" onclick="issue()" class="btn-issue-main">
            整理券を発行する
        </button>
    </div>

    <script src="script.js"></script>
    <script>
        // --- ページ読み込み時にマスターデータを取得 ---
        async function loadMasterData() {
            const vSelect = document.getElementById('v-select');
            const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

            try {
                // sheet=master を指定して車両リストを取得
                const response = await fetch(`${API_URL}?sheet=master`);
                const data = await response.json();
                
                if (data && data.vehicles && data.vehicles.length > 0) {
                    vSelect.innerHTML = ''; // 読込中メッセージをクリア
                    data.vehicles.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v;
                        opt.textContent = v;
                        vSelect.appendChild(opt);
                    });
                } else {
                    vSelect.innerHTML = '<option value="">利用可能な車両がありません</option>';
                }
            } catch (e) {
                console.error("Master Load Error:", e);
                vSelect.innerHTML = '<option value="">リストの取得に失敗しました</option>';
            }
        }

        // ページロード時に実行
        window.addEventListener('load', loadMasterData);

        // --- 整理券発行処理 ---
        async function issue() {
            const b = document.getElementById('btn'); 
            const v = document.getElementById('v-select').value;
            const t = document.querySelector('input[name="t"]:checked').value;
            const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

            if (!v) {
                alert("車両を選択してください。");
                return;
            }

            b.disabled = true; 
            b.innerText = "通信中...";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: 'issue', type: t, vehicle: v })
                });
                const res = await response.json();
                
                if(res.result === 'success') {
                    localStorage.setItem('my_ticket_id', res.id);
                    localStorage.setItem('my_ticket_v', v);
                    location.href = `issued.html?id=${res.id}&v=${encodeURIComponent(v)}`;
                } else {
                    alert("発行に失敗しました。");
                    b.disabled = false;
                    b.innerText = "整理券を発行する";
                }
            } catch (e) {
                alert("エラーが発生しました。");
                b.disabled = false;
                b.innerText = "整理券を発行する";
            }
        }
    </script>
</body>
</html>
