<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受付入力</title><link rel="stylesheet" href="style.css">
</head>
<body class="entry-mode">
    <button onclick="location.href='index.html'">← 戻る</button>
    <div class="selection-card">
        <h2>運転体験 受付</h2>
        <label>🚆 車両選択</label>
        <select id="v-select" class="huge-select">
            <option value="E5系 はやぶさ">E5系 はやぶさ</option>
            <option value="E235系 山手線">E235系 山手線</option>
            <option value="ドクターイエロー">923形 ドクターイエロー</option>
        </select>
        <div class="radio-group">
            <input type="radio" id="s" name="t" value="S" checked><label for="s">特別運転台</label>
            <input type="radio" id="a" name="t" value="A"><label for="a">普通運転台</label>
        </div>
        <button id="btn" onclick="issue()" class="btn-issue-main">発行する</button>
    </div>
    <script src="script.js"></script>
    <script>
        async function issue() {
            const b = document.getElementById('btn'); b.disabled = true; b.innerText = "発行中...";
            const v = document.getElementById('v-select').value;
            const t = document.querySelector('input[name="t"]:checked').value;
            const res = await postToSheet({ action: 'issue', type: t, vehicle: v });
            if(res.result === 'success') location.href = `issued.html?id=${res.id}&v=${encodeURIComponent(v)}`;
            else { alert("失敗"); b.disabled = false; b.innerText = "発行する"; }
        }
    </script>
</body>
</html>
