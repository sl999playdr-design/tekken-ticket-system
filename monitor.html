<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄研模型特設サイト</title>
    <style>
        body {
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: serif;
            font-weight: 900;
        }

        .admin-link {
            position: fixed; top: 20px; right: 20px; text-decoration: none;
            color: #333; border: 1px solid #ccc; padding: 8px 16px;
            font-size: 0.9rem; border-radius: 4px; background: white; z-index: 1000;
        }

        /* --- 表示器本体 --- */
        .lcd-board {
            position: relative;
            width: 900px;
            aspect-ratio: 16 / 9;
            background-image: url('hassyahyou.png');
            background-size: contain;
            background-repeat: no-repeat;
            margin-top: 40px;
        }

        /* --- 網掛け（マスク）位置 --- */
        .mask-upper {
            position: absolute; top: 41%; left: 6%; width: 88.5%; height: 80px;
            background-image: url('amikake.png'); background-size: 100% 100%;
            z-index: 100; pointer-events: none;
        }

        .mask-lower {
            position: absolute; top: 59.5%; left: 6%; width: 88.5%; height: 80px;
            background-image: url('amikake.png'); background-size: 100% 100%;
            z-index: 101; pointer-events: none;
        }

        /* --- LED文字の基本設定 --- */
        .led-item {
            position: absolute;
            font-family: serif;
            font-weight: 900;
            display: flex;
            align-items: baseline;
            justify-content: center;
            z-index: 50;
        }
        small { font-size: 0.9rem; margin-left: 2px; }

        /* --- 各パーツを独立して配置（ここで微調整） --- */

        /* 1. 待ち時間 (緑) */
        .pos-time {
            top: 45%; 
            left: 10%; /* もっと左へ */
            width: 150px;
            color: #00ff44;
            font-size: 3.8rem;
            text-shadow: 0 0 8px rgba(0, 255, 68, 0.6);
        }

        /* 2. まち組 (深オレンジ) */
        .pos-wait {
            top: 45%;
            left: 31%; /* 待ち時間の右隣・左寄り */
            width: 150px;
            color: #ff8800;
            font-size: 3.8rem;
            text-shadow: 0 0 8px rgba(255, 136, 0, 0.6);
        }

        /* 3. ただいま呼び出し中 (黄色) */
        .pos-calling {
            top: 45%;
            left: 55%; /* まち組の右隣・左寄り */
            width: 280px;
            color: #ffcc00;
            font-size: 4.8rem;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.6);
            letter-spacing: -2px;
        }

        /* 4. 下段テロップ (深オレンジ) */
        .pos-telop {
            position: absolute;
            bottom: 25%; /* 元の位置 5% */
            left: 6.8%;
            width: 86.6%;
            height: 80px;
            display: flex;
            align-items: center;
            z-index: 40; /* 網掛け(101)より下、背景より上 */
        }

        marquee {
            width: 100%;
            font-size: 2.8rem;
            color: #ff8800;
            text-shadow: 0 0 8px rgba(255, 136, 0, 0.5);
        }

        .btn-issue {
            margin-top: 30px; padding: 18px 60px; background: #008542;
            color: #fff; text-decoration: none; font-size: 1.6rem;
            font-weight: 900; border-radius: 50px; box-shadow: 0 5px 0 #005a2d;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <a href="staff.html" class="admin-link">⚙ 管理ボタン</a>

    <div class="lcd-board">
        <div class="mask-upper"></div>
        <div class="mask-lower"></div>

        <div class="led-item pos-time"><span id="wait-time">0</span><small>分</small></div>
        <div class="led-item pos-wait"><span id="wait-count">0</span><small>組</small></div>
        <div class="led-item pos-calling" id="calling-now">---</div>

        <div class="pos-telop">
            <marquee id="telop-text" scrollamount="12">☆鉄道研究部 模型展示特設サイトへようこそ☆</marquee>
        </div>
    </div>

    <a href="entry.html" class="btn-issue">整理券を発行する</a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";
        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const waitList = data.filter(d => d.status === 'resep');
                const count = waitList.length;
                document.getElementById('wait-count').innerText = count;
                document.getElementById('wait-time').innerText = count * 5;
                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds[callingIds.length - 1] : "---";
                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) document.getElementById('telop-text').innerText = mData.telop;
            } catch (e) { console.error("更新失敗:", e); }
        }
        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
