<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Monitor - 鉄道研究部</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- モニター画面（メイン） --- */
        .monitor-header {
            background-color: #333; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #c0392b;
        }
        .system-title { font-size: 1.1rem; font-weight: bold; color: #f1c40f; }

        .monitor-content { padding: 30px; text-align: center; }
        
        /* 運行情報パネル風 */
        .info-panel {
            border: 2px solid #444; background: #111;
            padding: 20px; margin-bottom: 30px; border-radius: 8px;
            display: inline-block; min-width: 300px;
        }
        .status-on { color: #2ecc71; font-size: 1.5rem; font-weight: bold; }

        .btn-staff-login {
            background: #444; color: #fff; border: 1px solid #666;
            padding: 12px 24px; border-radius: 4px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-staff-login:hover { background: #c0392b; border-color: #e74c3c; }

        /* --- パスワード入力モーダル（修正ポイント：初期は非表示） --- */
        #login-modal {
            display: none; /* 初期状態は非表示 */
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* 後ろを少し透かす */
            z-index: 2000;
            justify-content: center; align-items: center;
        }

        .login-box {
            background: #1a1a1a; border: 2px solid #f1c40f;
            padding: 40px; border-radius: 8px; text-align: center;
        }
        .login-box h2 { color: #f1c40f; margin-bottom: 20px; font-size: 1.1rem; }
        
        .login-box input {
            background: #000; border: 1px solid #444; color: #2ecc71;
            padding: 12px; width: 180px; font-size: 1.2rem; text-align: center;
            margin-bottom: 20px; outline: none;
        }

        .btn-auth { background: #2ecc71; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .btn-cancel { background: #555; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }

        /* 処理中表示 */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000;
            z-index: 3000; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="monitor-header">
    <div class="system-title">OPERATION CONTROL MONITOR v1.0</div>
    <div id="clock">00:00:00</div>
</div>

<div class="monitor-content">
    <div class="info-panel">
        <p style="color: #888; margin: 0 0 10px 0;">SYSTEM STATUS</p>
        <div class="status-on">● ONLINE / NORMAL</div>
    </div>
    <br>
    <button class="btn-staff-login" onclick="openLogin()">STAFF ONLY / 管理画面ログイン</button>
</div>

<div id="login-modal">
    <div class="login-box">
        <h2>ENTER ACCESS CODE</h2>
        <input type="password" id="pass-input" placeholder="****">
        <div style="display: flex; justify-content: center;">
            <button class="btn-auth" onclick="checkPassword()">OK</button>
            <button class="btn-cancel" onclick="closeLogin()">戻る</button>
        </div>
        <p id="error-msg" style="color: #e74c3c; margin-top: 15px; font-size: 0.8rem; visibility: hidden;">認証失敗</p>
    </div>
</div>

<div id="loading-overlay">
    <div style="color: #f1c40f; font-size: 1.5rem; letter-spacing: 5px;">COMMUNICATING...</div>
</div>

<script>
    // 時計
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // ログイン画面を表示
    function openLogin() {
        document.getElementById('login-modal').style.display = 'flex';
        document.getElementById('pass-input').focus();
    }

    // ログイン画面を閉じる
    function closeLogin() {
        document.getElementById('login-modal').style.display = 'none';
        document.getElementById('error-msg').style.visibility = 'hidden';
        document.getElementById('pass-input').value = '';
    }

    // パスワード確認
    async function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        if (pass === "1234") { // ここにパスワードを設定
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'flex';
            await new Promise(r => setTimeout(r, 1500));
            window.location.href = "staff.html";
        } else {
            document.getElementById('error-msg').style.visibility = 'visible';
        }
    }
</script>

</body>
</html>
