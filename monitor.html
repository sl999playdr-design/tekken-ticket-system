<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運行情報表示器 - LCD Monitor</title>
    <style>
        /* サイト全体：白背景 */
        body {
            background-color: #ffffff;
            color: #333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* 右上の管理ボタン（日本語） */
        .admin-link {
            position: absolute;
            top: 15px;
            right: 20px;
            text-decoration: none;
            color: #666;
            border: 1px solid #ccc;
            padding: 5px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: 0.2s;
        }
        .admin-link:hover { background: #f0f0f0; }

        /* 発車標の上の文字 */
        .display-title {
            margin-top: 60px;
            margin-bottom: 10px;
            text-align: center;
        }
        .display-title .main-jp { font-size: 1.8rem; font-weight: bold; color: #1a1a1a; display: block; }
        .display-title .sub-en { font-size: 0.9rem; color: #666; display: block; }

        /* LCD発車標本体（小田急風） */
        .lcd-board {
            width: 95vw;
            max-width: 1000px;
            background: #1a1c23; /* 深い紺・黒 */
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            overflow: hidden;
            padding: 15px;
            box-sizing: border-box;
        }

        /* ヘッダー（項目名） */
        .lcd-header {
            display: flex;
            border-bottom: 2px solid #3e4453;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .h-col { font-size: 0.85rem; color: #abb2bf; text-align: center; }

        /* データ行 */
        .lcd-row {
            display: flex;
            height: 90px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            margin-bottom: 8px;
            border-radius: 2px;
        }

        /* 各列の幅とデザイン */
        .col-type { width: 20%; display: flex; justify-content: center; }
        .type-box { 
            padding: 10px 20px; border-radius: 4px; font-weight: bold; font-size: 1.6rem; color: #fff;
            min-width: 120px; text-align: center;
        }
        .type-s { background: #e0245e; } /* 急行風の赤 */
        .type-a { background: #1d9bf0; } /* 快速風の青 */

        .col-wait { width: 20%; font-size: 2.8rem; color: #fff; text-align: center; font-weight: 500; }
        .col-time { width: 20%; font-size: 2.8rem; color: #fff; text-align: center; font-weight: 500; }
        .col-id   { width: 40%; font-size: 3.5rem; color: #f9d849; text-align: center; font-family: 'Consolas', monospace; }

        /* 下部テロップエリア */
        .lcd-footer {
            margin-top: 10px;
            background: #000;
            height: 50px;
            display: flex;
            align-items: center;
            border: 1px solid #333;
        }
        marquee { font-size: 1.6rem; color: #ff9d00; font-weight: bold; }

        /* 整理券ボタン（中央下） */
        .btn-issue {
            margin-top: 50px;
            display: block;
            width: 300px;
            padding: 18px;
            background: #008542;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,133,66,0.3);
            transition: 0.3s;
        }
        .btn-issue:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,133,66,0.4); }
    </style>
</head>
<body>

    <a href="staff.html" class="admin-link">システム管理</a>

    <div class="display-title">
        <span class="main-jp">今度の発車は</span>
        <span class="sub-en">Next Train</span>
    </div>

    <div class="lcd-board">
        <div class="lcd-header">
            <div class="h-col" style="width: 20%;">種別</div>
            <div class="h-col" style="width: 20%;">待ち組数</div>
            <div class="h-col" style="width: 20%;">目安時間</div>
            <div class="h-col" style="width: 40%;">ただいまの呼出番号</div>
        </div>

        <div class="lcd-row">
            <div class="col-type">
                <div class="type-box type-s">先発</div>
            </div>
            <div class="col-wait"><span id="wait-count">0</span><small style="font-size:1rem;">組</small></div>
            <div class="col-time"><span id="wait-time">0</span><small style="font-size:1rem;">分</small></div>
            <div class="col-id" id="calling-now">---</div>
        </div>

        <div class="lcd-footer">
            <marquee id="telop-text" scrollamount="10">運行システムに接続しています...</marquee>
        </div>
    </div>

    <a href="entry.html" class="btn-issue">整理券を発行する</a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // 待ち組数計算
                const waitList = data.filter(d => d.status === 'resep');
                document.getElementById('wait-count').innerText = waitList.length;
                document.getElementById('wait-time').innerText = waitList.length * 5;

                // 呼出番号（最新の1つを表示）
                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds[callingIds.length - 1] : "---";

                // テロップ取得
                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) {
                    document.getElementById('telop-text').innerText = mData.telop;
                }

            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
