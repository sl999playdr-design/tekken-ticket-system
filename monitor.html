<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-SCALE OPERATION MONITOR / 名古屋中高 鉄研</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- 業務端末風ベーススタイル --- */
        body.viewer-mode {
            background-color: #050505;
            color: #ccc;
            font-family: "MS Gothic", "Osaka-mono", monospace;
            margin: 0;
        }

        /* トップナビの無機質化 */
        .top-nav {
            background-color: #111;
            border-bottom: 1px solid #333;
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-entry {
            background: #222;
            color: #aaa;
            border: 1px solid #444;
            padding: 5px 15px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-entry:hover { background: #333; color: #fff; }

        /* メインモニター */
        .lcd-panel {
            background: #000;
            border: 2px solid #222;
            padding: 20px;
            margin-top: 20px;
        }

        .lcd-header {
            border-bottom: 1px solid #222;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .lcd-label { color: #555; font-size: 0.7rem; }
        .lcd-main-title { color: #888; font-size: 0.9rem; }

        .lcd-number {
            color: #ffcc00;
            font-size: 5rem;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        /* ロード中アニメーション（業務用） */
        .loading-text {
            color: #444 !important;
            animation: system-pulse 1.5s infinite;
        }
        @keyframes system-pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* ステータスカードの簡素化 */
        .status-grid { display: flex; gap: 10px; margin-top: 10px; }
        .status-card {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 10px;
        }
        .status-card .label { color: #555; font-size: 0.7rem; }
        .status-card .value { color: #0f0; font-size: 1.5rem; }

        /* --- スタッフ認証用モーダル (質素な業務用) --- */
        #login-modal {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center; align-items: center;
        }
        .login-box {
            background: #000;
            border: 1px solid #444;
            padding: 40px;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }
        .login-box h2 {
            color: #fff;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }
        .login-field { margin-bottom: 30px; }
        .login-field label {
            display: block;
            color: #666;
            font-size: 0.65rem;
            margin-bottom: 8px;
        }
        .login-field input {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #0f0; /* アンバーやグリーン系 */
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 1.2rem;
            outline: none;
        }
        .login-field input:focus { border-color: #555; }

        .auth-btn-group { display: flex; gap: 10px; }
        .btn-execute {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 0;
            flex: 2;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .btn-execute:hover { background: #444; }
        .btn-close {
            background: transparent;
            color: #555;
            border: 1px solid #222;
            padding: 8px 15px;
            flex: 1;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* --- 通信中オーバーレイ --- */
        #loading-overlay {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            z-index: 10000;
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        .sync-text {
            color: #0f0;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 4px;
        }
        .sync-sub { color: #333; font-size: 0.6rem; margin-top: 10px; }

    </style>
</head>
<body class="viewer-mode">

    <nav class="top-nav">
        <div>
            <button onclick="location.href='entry.html'" class="btn-entry">NEW_TICKET</button>
            <button id="resume-btn" class="btn-entry" style="display:none; margin-left:10px;">RESUME_MY_DATA</button>
        </div>
        <button onclick="openStaffLogin()" style="background:none; border:none; color:#222; cursor:pointer; font-size:0.7rem;">
            [ SYS_ADMIN ]
        </button>
    </nav>

    <main class="monitor-container" style="padding: 0 20px;">
        <div class="lcd-panel">
            <div class="lcd-header">
                <span class="lcd-label">OPE_STATUS: ACTIVE</span>
                <span class="lcd-main-title">CURRENT_CALL_NUMBER</span>
            </div>
            
            <div id="calling-now" class="lcd-number loading-text">
                INITIALIZING...
            </div>
            
            <div class="lcd-footer" style="margin-top:20px; border-top:1px solid #111; padding-top:10px;">
                <marquee scrollamount="3" style="color: #444; font-size: 0.8rem;">
                    SYSTEM_READY... PLEASE WAIT FOR YOUR NUMBER... OBSERVE SAFETY RULES...
                </marquee>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="label">WAITING_GROUPS</div>
                <div class="value"><span id="wait-count">0</span></div>
            </div>
            <div class="status-card">
                <div class="label">EST_WAIT_TIME (MIN)</div>
                <div class="value"><span id="wait-time">0</span></div>
            </div>
        </div>
    </main>

    <div id="login-modal">
        <div class="login-box">
            <h2>STAFF_ONLY_AUTHENTICATION</h2>
            <div class="login-field">
                <label>ACCESS_PASSWORD</label>
                <input type="password" id="pass-input" spellcheck="false">
            </div>
            <div class="auth-btn-group">
                <button class="btn-execute" onclick="verifyPassword()">EXECUTE</button>
                <button class="btn-close" onclick="closeStaffLogin()">EXIT</button>
            </div>
            <p id="error-msg" style="color: #600; margin-top: 15px; font-size: 0.6rem; visibility: hidden; text-align: center;">
                ERROR: AUTHENTICATION_FAILED
            </p>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="sync-text">CONNECTING_TO_HOST...</div>
        <div class="sync-sub">Establishing secure link to staff_console.sys</div>
    </div>

    <script src="script.js"></script>
    
    <script>
        function openStaffLogin() {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('pass-input').focus();
        }

        function closeStaffLogin() {
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('pass-input').value = '';
            document.getElementById('error-msg').style.visibility = 'hidden';
        }

        async function verifyPassword() {
            const pass = document.getElementById('pass-input').value;
            // パスワードチェック
            if (pass === "1234") {
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('loading-overlay').style.display = 'flex';
                
                // 事務的なウェイト演出
                await new Promise(resolve => setTimeout(resolve, 1500));
                location.href = 'staff.html';
            } else {
                document.getElementById('error-msg').style.visibility = 'visible';
                document.getElementById('pass-input').value = '';
            }
        }

        // --- データ更新ロジック ---
        async function updateDisplay() {
            try {
                // script.js 内の fetchSheetData を使用
                const data = await fetchSheetData();
                const callingDisplay = document.getElementById('calling-now');
                callingDisplay.classList.remove('loading-text');

                // 呼出中(call)の番号を抽出
                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                callingDisplay.innerText = callingIds.length > 0 ? callingIds.join(' / ') : "---";

                // 待ち組数
                const waitingCount = data.filter(d => d.status === 'resep').length;
                document.getElementById('wait-count').innerText = waitingCount;
                document.getElementById('wait-time').innerText = waitingCount * 5;

                // 自分のチケットがある場合の再表示ボタン制御
                manageResumeButton(data);

            } catch (e) {
                console.error("SYS_ERR:", e);
            }
        }

        function manageResumeButton(data) {
            const savedId = localStorage.getItem('my_ticket_id');
            const resumeBtn = document.getElementById('resume-btn');
            if (!savedId) return;

            const myTicket = data.find(d => d.id === savedId);
            if (myTicket && myTicket.status !== 'end') {
                resumeBtn.style.display = 'inline-block';
                resumeBtn.onclick = () => {
                    location.href = `issued.html?id=${savedId}&v=${encodeURIComponent(localStorage.getItem('my_ticket_v'))}`;
                };
            }
        }

        // 初期実行と定期実行
        updateDisplay();
        setInterval(updateDisplay, 10000);
    </script>
</body>
</html>
