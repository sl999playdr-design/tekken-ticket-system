<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄研模型特設サイト</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Inter:wght@900&display=swap');

        body {
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans JP', sans-serif;
        }

        /* ⚙管理ボタン：画面の右上に固定 */
        .admin-link {
            position: fixed;
            top: 20px;
            right: 20px;
            text-decoration: none;
            color: #666;
            border: 1px solid #ccc;
            padding: 8px 15px;
            font-size: 0.85rem;
            border-radius: 4px;
            background: rgba(255,255,255,0.9);
            z-index: 1000; /* 最前面 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* --- 表示器本体 --- */
        .lcd-board {
            position: relative;
            width: 900px; /* 画像の表示幅 */
            aspect-ratio: 16 / 9; /* 画像の比率を維持 */
            background-image: url('hassyahyou.png');
            background-size: contain;
            background-repeat: no-repeat;
            margin-top: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        /* --- LED上段（待ち時間・待ち組・呼出） --- */
        .led-upper-zone {
            position: absolute;
            top: 38%;    /* 黒枠上段の位置 */
            left: 7.2%;  /* 黒枠の左端 */
            width: 85.6%;
            height: 25%; /* 黒枠上段の高さ */
            display: flex;
            align-items: center;
            z-index: 5;
        }

        /* --- LED下段（テロップ用） --- */
        .led-lower-zone {
            position: absolute;
            top: 66%;    /* 黒枠下段の位置 */
            left: 7.2%;
            width: 85.6%;
            height: 25%;
            display: flex;
            align-items: center;
            z-index: 5;
        }

        /* 網掛け：一番手前に重ねる */
        .led-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('amikake.png');
            background-size: cover;
            opacity: 0.6;
            z-index: 100; /* 文字よりも前に出す */
            pointer-events: none;
        }

        .led-text {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-weight: 900;
            text-align: center;
            line-height: 1;
        }

        /* 各項目の幅と色の調整 */
        .col-time { width: 33%; color: #00ff44; font-size: 4.5rem; }
        .col-wait { width: 34%; color: #ff9d00; font-size: 4.5rem; }
        .col-id   { width: 33%; color: #ffca00; font-size: 5.5rem; letter-spacing: -2px; }

        small { font-size: 1.2rem; margin-left: 3px; vertical-align: baseline; }

        marquee {
            width: 100%;
            font-size: 2.2rem;
            color: #ff9d00;
            font-weight: 900;
        }

        .btn-issue {
            margin-top: 30px;
            padding: 18px 60px;
            background: #008542;
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 50px;
            box-shadow: 0 5px 0 #005a2d;
            transition: 0.1s;
        }
        .btn-issue:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

    <a href="staff.html" class="admin-link">⚙ 管理ボタン</a>

    <div class="lcd-board">
        <div class="led-upper-zone">
            <div class="led-mask"></div> <div class="led-text col-time"><span id="wait-time">0</span><small>分</small></div>
            <div class="led-text col-wait"><span id="wait-count">0</span><small>組</small></div>
            <div class="led-text col-id" id="calling-now">---</div>
        </div>

        <div class="led-lower-zone">
            <div class="led-mask"></div> <marquee id="telop-text" scrollamount="10">運行システムに接続中...</marquee>
        </div>
    </div>

    <a href="entry.html" class="btn-issue">整理券を発行する</a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const waitList = data.filter(d => d.status === 'resep');
                const count = waitList.length;
                const minutes = count * 5;

                document.getElementById('wait-count').innerText = count;
                document.getElementById('wait-time').innerText = minutes;

                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds[callingIds.length - 1] : "---";

                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) document.getElementById('telop-text').innerText = mData.telop;
            } catch (e) { console.error(e); }
        }
        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
