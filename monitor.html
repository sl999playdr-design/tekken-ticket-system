<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄研模型特設サイト</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Inter:wght@900&display=swap');

        body {
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans JP', sans-serif;
        }

        /* ⚙ 管理ボタン */
        .admin-link {
            position: fixed;
            top: 20px;
            right: 20px;
            text-decoration: none;
            color: #333;
            border: 1px solid #ccc;
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 4px;
            background: white;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* --- 表示器本体 --- */
        .lcd-board {
            position: relative;
            width: 900px;
            aspect-ratio: 16 / 9;
            background-image: url('hassyahyou.png');
            background-size: contain;
            background-repeat: no-repeat;
            margin-top: 40px;
        }

        /* --- 網掛け1枚目（上段専用） --- */
        .mask-upper-final {
            position: absolute;
            top: 41%; 
            left: 6%;
            width: 88.5%;
            height: 80px;
            background-image: url('amikake.png');
            background-repeat: no-repeat;
            background-size: 100% 100%;
            z-index: 100;
            pointer-events: none;
        }

        /* --- 網掛け2枚目（下段専用：位置を上に調整） --- */
        .mask-lower-final {
            position: absolute;
            top: 60%; /* 68%から64%へ引き上げ */
            left: 6%;
            width: 88.5%;
            height: 80px;
            background-image: url('amikake.png');
            background-repeat: no-repeat;
            background-size: 100% 100%;
            z-index: 101;
            pointer-events: none;
        }

        /* --- 文字コンテンツ --- */
        .led-content-wrapper {
            position: absolute;
            top: 38.5%;
            left: 6.8%;
            width: 86.6%;
            height: 52%;
            z-index: 50; 
        }

        .upper-row {
            display: flex;
            height: 45%;
            align-items: center;
        }

        .lower-row {
            position: absolute;
            bottom: 5%;
            width: 100%;
            height: 40%;
            display: flex;
            align-items: center;
        }

        .led-text {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-weight: 900;
            text-align: center;
        }

        .col-time { width: 33%; color: #00ff66; font-size: 5rem; }
        .col-wait { width: 34%; color: #ffcc00; font-size: 5rem; }
        .col-id   { width: 33%; color: #ffff00; font-size: 6rem; letter-spacing: -2px; }

        small { font-size: 1.2rem; margin-left: 4px; }

        marquee {
            width: 100%;
            font-size: 2.8rem;
            color: #ffcc00;
            font-weight: 900;
        }

        .btn-issue {
            margin-top: 30px;
            padding: 18px 60px;
            background: #008542;
            color: #fff;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 900;
            border-radius: 50px;
            box-shadow: 0 5px 0 #005a2d;
        }
    </style>
</head>
<body>

    <a href="staff.html" class="admin-link">⚙ 管理ボタン</a>

    <div class="lcd-board">
        <div class="mask-upper-final"></div>
        <div class="mask-lower-final"></div>

        <div class="led-content-wrapper">
            <div class="upper-row">
                <div class="led-text col-time"><span id="wait-time">0</span><small>分</small></div>
                <div class="led-text col-wait"><span id="wait-count">0</span><small>組</small></div>
                <div class="led-text col-id" id="calling-now">---</div>
            </div>
            <div class="lower-row">
                <marquee id="telop-text" scrollamount="12">☆鉄道研究部 模型展示特設サイトへようこそ☆</marquee>
            </div>
        </div>
    </div>

    <a href="entry.html" class="btn-issue">整理券を発行する</a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";
        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const waitList = data.filter(d => d.status === 'resep');
                const count = waitList.length;
                document.getElementById('wait-count').innerText = count;
                document.getElementById('wait-time').innerText = count * 5;
                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds[callingIds.length - 1] : "---";
                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) document.getElementById('telop-text').innerText = mData.telop;
            } catch (e) { console.error("更新失敗:", e); }
        }
        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
