<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道模型 運行状況モニター</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- 全体レイアウト（白基調） --- */
        body.viewer-mode {
            background-color: #f8f9fa;
            color: #333;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
        }

        .top-nav {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-entry {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-entry:hover { background: #0056b3; }

        /* メインパネル */
        .monitor-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .lcd-panel {
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 40px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .lcd-main-title {
            color: #6c757d;
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: block;
        }

        .lcd-number {
            color: #dc3545; /* 呼出番号は目立つ赤 */
            font-size: 5rem;
            font-weight: bold;
            font-family: sans-serif;
        }

        /* ステータス表示 */
        .status-grid {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .status-card {
            flex: 1;
            background: #fff;
            border: 1px solid #dee2e6;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .status-card .label { color: #6c757d; font-size: 0.9rem; margin-bottom: 5px; }
        .status-card .value { color: #333; font-size: 2rem; font-weight: bold; }

        /* --- スタッフログインモーダル（白背景・シンプル） --- */
        #login-modal {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            justify-content: center; align-items: center;
        }
        .login-box {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-box h2 { font-size: 1.1rem; margin-bottom: 20px; color: #333; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }
        .auth-btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn-execute { background: #333; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; }
        .btn-close { background: none; border: none; color: #888; cursor: pointer; font-size: 0.9rem; }

        /* --- 読み込み画面（白背景・中央ぐるぐる） --- */
        #loading-overlay {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            margin-top: 20px;
            color: #555;
            font-size: 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body class="viewer-mode">

    <nav class="top-nav">
        <div>
            <button onclick="location.href='entry.html'" class="btn-entry">新規 整理券発行</button>
            <button id="resume-btn" class="btn-entry" style="display:none; margin-left:10px; background:#6c757d;">自分の整理券を表示</button>
        </div>
        <button onclick="openStaffLogin()" style="background:none; border:none; color:#ced4da; cursor:pointer; font-size:0.8rem;">管理</button>
    </nav>

    <main class="monitor-container">
        <div class="lcd-panel">
            <span class="lcd-main-title">ただいまの呼出番号</span>
            <div id="calling-now" class="lcd-number">---</div>
            
            <div style="margin-top:30px;">
                <p style="color: #6c757d; font-size: 0.9rem;">
                    番号が呼ばれましたら、受付までお越しください。
                </p>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="label">待ち組数</div>
                <div class="value"><span id="wait-count">0</span> <small style="font-size: 1rem;">組</small></div>
            </div>
            <div class="status-card">
                <div class="label">推定待ち時間</div>
                <div class="value"><span id="wait-time">0</span> <small style="font-size: 1rem;">分</small></div>
            </div>
        </div>
    </main>

    <div id="login-modal">
        <div class="login-box">
            <h2>スタッフ認証</h2>
            <input type="password" id="pass-input" placeholder="パスワードを入力">
            <div class="auth-btn-group">
                <button class="btn-execute" onclick="verifyPassword()">ログイン</button>
                <button class="btn-close" onclick="closeStaffLogin()">キャンセル</button>
            </div>
            <p id="error-msg" style="color: #dc3545; margin-top: 10px; font-size: 0.8rem; visibility: hidden;">
                パスワードが正しくありません
            </p>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">読み込み中...</div>
    </div>

    <script src="script.js"></script>
    
    <script>
        function openStaffLogin() {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('pass-input').focus();
        }

        function closeStaffLogin() {
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('pass-input').value = '';
            document.getElementById('error-msg').style.visibility = 'hidden';
        }

        async function verifyPassword() {
            const pass = document.getElementById('pass-input').value;
            if (pass === "1234") {
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('loading-overlay').style.display = 'flex';
                
                // 1.5秒待機
                await new Promise(resolve => setTimeout(resolve, 1500));
                location.href = 'staff.html';
            } else {
                document.getElementById('error-msg').style.visibility = 'visible';
                document.getElementById('pass-input').value = '';
            }
        }

        async function updateDisplay() {
            try {
                const data = await fetchSheetData();
                const callingDisplay = document.getElementById('calling-now');

                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                callingDisplay.innerText = callingIds.length > 0 ? callingIds.join(' / ') : "---";

                const waitingCount = data.filter(d => d.status === 'resep').length;
                document.getElementById('wait-count').innerText = waitingCount;
                document.getElementById('wait-time').innerText = waitingCount * 5;

                manageResumeButton(data);
            } catch (e) { console.error("Update Error:", e); }
        }

        function manageResumeButton(data) {
            const savedId = localStorage.getItem('my_ticket_id');
            const resumeBtn = document.getElementById('resume-btn');
            if (!savedId) return;

            const myTicket = data.find(d => d.id === savedId);
            if (myTicket && myTicket.status !== 'end') {
                resumeBtn.style.display = 'inline-block';
                resumeBtn.onclick = () => {
                    location.href = `issued.html?id=${savedId}&v=${encodeURIComponent(localStorage.getItem('my_ticket_v'))}`;
                };
            }
        }

        updateDisplay();
        setInterval(updateDisplay, 10000);
    </script>
</body>
</html>
