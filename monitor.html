<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nゲージ運行状況モニター</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ロード中の文字を目立たせるスタイル */
        .loading-text {
            color: #ffcc00 !important; /* 鮮やかなオレンジ黄色 */
            font-size: 3rem !important;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="viewer-mode">

    <nav class="top-nav" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <button onclick="location.href='entry.html'" class="btn-entry">
                <span>🎫</span> 新規 整理券発行
            </button>
            <button id="resume-btn" class="btn-entry" style="display:none; background: #2c3e50; box-shadow: 0 4px 0 #1a252f; margin-left: 10px;">
                <span>📄</span> 自分の再表示
            </button>
        </div>
        <button onclick="location.href='staff.html'" style="background:none; border:none; color:#bbb; cursor:pointer; font-size:0.8rem;">
            ⚙️ 管理
        </button>
    </nav>

    <main class="monitor-container">
        <div class="lcd-panel">
            <div class="lcd-header">
                <span class="lcd-label">STATUS</span>
                <span class="lcd-main-title">ただいまの呼出番号</span>
            </div>
            
            <div id="calling-now" class="lcd-number loading-text">
                LOADING...
            </div>
            
            <div class="lcd-footer">
                <marquee scrollamount="5">【鉄道研究部】 整理券番号が呼ばれましたら、受付までお越しください。 ジオラマの安全運転にご協力をお願いします。</marquee>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="label">待ち組数</div>
                <div class="value"><span id="wait-count">0</span> <small>組</small></div>
            </div>
            <div class="status-card">
                <div class="label">推定待ち時間</div>
                <div class="value"><span id="wait-time">0</span> <small>分</small></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    
    <script>
        function manageResumeButton(data) {
            const savedId = localStorage.getItem('my_ticket_id');
            const resumeBtn = document.getElementById('resume-btn');
            
            if (!savedId) {
                resumeBtn.style.display = 'none';
                return;
            }

            const myTicket = data.find(d => d.id === savedId);
            
            if (myTicket && myTicket.status !== 'end') {
                resumeBtn.style.display = 'inline-block';
                resumeBtn.onclick = () => {
                    location.href = `issued.html?id=${savedId}&v=${encodeURIComponent(localStorage.getItem('my_ticket_v'))}`;
                };
            } else {
                localStorage.removeItem('my_ticket_id');
                localStorage.removeItem('my_ticket_v');
                resumeBtn.style.display = 'none';
            }
        }

        async function updateDisplay() {
            try {
                const data = await fetchSheetData();
                
                // 通信が完了したら「loading-text」クラスを外す
                const callingDisplay = document.getElementById('calling-now');
                callingDisplay.classList.remove('loading-text');

                manageResumeButton(data);

                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                callingDisplay.innerText = callingIds.length > 0 ? callingIds.join(' / ') : "お待ちください";

                const waitingCount = data.filter(d => d.status === 'resep').length;
                document.getElementById('wait-count').innerText = waitingCount;
                document.getElementById('wait-time').innerText = waitingCount * 5;

            } catch (e) {
                console.error("更新エラー:", e);
            }
        }

        updateDisplay();
        setInterval(updateDisplay, 10000);
    </script>
</body>
</html>
