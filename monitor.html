<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄研模型特設サイト</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Inter:wght@900&display=swap');

        body {
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans JP', sans-serif;
        }

        /* --- 表示器本体（hassyahyou.png を背景に） --- */
        .lcd-board {
            position: relative;
            width: 1000px;  /* 作成された画像の横幅に合わせてください */
            height: 563px; /* 作成された画像の縦幅に合わせてください */
            background-image: url('hassyahyou.png');
            background-size: contain;
            background-repeat: no-repeat;
            margin-top: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* --- LED表示部：黒枠の座標に合わせてここを調整 --- */
        .led-display-zone {
            position: absolute;
            /* ↓ ここを表示機の「黒い部分」の左上の座標に合わせます */
            top: 232px;  
            left: 55px;  
            /* ↓ ここを表示機の「黒い部分」のサイズに合わせます */
            width: 890px;
            height: 300px;
            overflow: hidden;
        }

        /* 網掛けレイヤー（黒枠と同じサイズの画像） */
        .led-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('amikake.jpeg');
            background-size: 100% 100%;
            opacity: 0.6; /* お好みで濃さを調整してください */
            z-index: 10;
            pointer-events: none;
        }

        /* コンテンツ（網掛けのさらに前面に出す） */
        .led-content {
            position: relative;
            z-index: 20; 
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 数字・データの行 */
        .data-row {
            display: flex;
            height: 180px; /* 位置に合わせて微調整 */
            align-items: center;
            justify-content: space-around;
        }

        .led-text {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-weight: 900;
            text-align: center;
        }

        /* 各色の設定 */
        .col-time { width: 33%; color: #00ff44; font-size: 5.5rem; }
        .col-wait { width: 34%; color: #ff9d00; font-size: 5.5rem; }
        .col-id   { width: 33%; color: #ffca00; font-size: 6.5rem; }

        small { font-size: 1.5rem; margin-left: 5px; }

        /* テロップ行 */
        .telop-row {
            flex-grow: 1;
            display: flex;
            align-items: center;
            padding-bottom: 20px;
        }

        marquee {
            font-size: 2.2rem;
            color: #ff9d00;
            font-weight: 900;
        }

        /* 整理券ボタン（表示器の外） */
        .btn-issue {
            margin-top: 40px;
            padding: 18px 50px;
            background: #008542;
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 8px;
            box-shadow: 0 4px 0 #005a2d;
        }
    </style>
</head>
<body>

    <div class="lcd-board">
        <div class="led-display-zone">
            <div class="led-mask"></div>

            <div class="led-content">
                <div class="data-row">
                    <div class="led-text col-time" id="time-display">
                        <span id="wait-time">0</span><small>分</small>
                    </div>
                    <div class="led-text col-wait">
                        <span id="wait-count">0</span><small>組</small>
                    </div>
                    <div class="led-text col-id" id="calling-now">---</div>
                </div>
                
                <div class="telop-row">
                    <marquee id="telop-text" scrollamount="12">運行情報を取得中...</marquee>
                </div>
            </div>
        </div>
    </div>

    <a href="entry.html" class="btn-issue">整理券を発行する</a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const waitList = data.filter(d => d.status === 'resep');
                const count = waitList.length;
                const minutes = count * 5;

                document.getElementById('wait-count').innerText = count;
                document.getElementById('wait-time').innerText = minutes;

                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds[callingIds.length - 1] : "---";

                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) document.getElementById('telop-text').innerText = mData.telop;
            } catch (e) { console.error(e); }
        }
        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
