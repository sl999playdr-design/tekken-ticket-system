<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道模型 運行状況モニター</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 白基調のシンプルデザイン */
        body.viewer-mode {
            background-color: #f8f9fa;
            color: #333;
            font-family: sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .top-nav {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-entry {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        /* メインパネル */
        .monitor-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .lcd-panel {
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 40px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .lcd-number {
            color: #dc3545;
            font-size: 6rem;
            font-weight: bold;
        }

        /* 下部テロップ (スプレッドシート連動) */
        .marquee-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #333;
            color: #fff;
            padding: 10px 0;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* モーダル・読み込み画面のスタイルは以前のものを維持 */
        #loading-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 10000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #login-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 9999;
            justify-content: center; align-items: center;
        }
        .login-box { background: #fff; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 15px 0; box-sizing: border-box; }
    </style>
</head>
<body class="viewer-mode">

    <nav class="top-nav">
        <div>
            <button onclick="location.href='entry.html'" class="btn-entry">新規 整理券発行</button>
            <button id="resume-btn" class="btn-entry" style="display:none; margin-left:10px; background:#6c757d;">自分の整理券</button>
        </div>
        <button onclick="openStaffLogin()" style="background:none; border:none; color:#ced4da; cursor:pointer;">管理</button>
    </nav>

    <main class="monitor-container">
        <div class="lcd-panel">
            <span style="color:#666;">ただいまの呼出番号</span>
            <div id="calling-now" class="lcd-number">---</div>
        </div>
    </main>

    <div class="marquee-container">
        <marquee id="telop-text" scrollamount="8">情報を読み込み中...</marquee>
    </div>

    <div id="login-modal">
        <div class="login-box">
            <h3>スタッフ認証</h3>
            <input type="password" id="pass-input" placeholder="パスワードを入力">
            <button onclick="verifyPassword()" style="width:100%; padding:10px; background:#333; color:#fff; border:none;">ログイン</button>
            <button onclick="closeStaffLogin()" style="background:none; border:none; color:#999; margin-top:10px;">キャンセル</button>
            <p id="error-msg" style="color:red; font-size:0.8rem; visibility:hidden;">パスワードが違います</p>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>読み込み中...</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

        // 1. 呼出番号とテロップの更新
        async function updateDisplay() {
            try {
                // 通常データ取得
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // 呼出中番号の表示
                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds.join(' / ') : "---";

                // マスターデータ（テロップ）の取得
                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) {
                    document.getElementById('telop-text').innerText = mData.telop;
                }

                // 自分の整理券ボタンの管理
                const savedId = localStorage.getItem('my_ticket_id');
                const resumeBtn = document.getElementById('resume-btn');
                if (savedId) {
                    const myTicket = data.find(d => d.id === savedId);
                    if (myTicket && myTicket.status !== 'end') {
                        resumeBtn.style.display = 'inline-block';
                        resumeBtn.onclick = () => {
                            location.href = `issued.html?id=${savedId}&v=${encodeURIComponent(localStorage.getItem('my_ticket_v'))}`;
                        };
                    } else {
                        resumeBtn.style.display = 'none';
                    }
                }
            } catch (e) { console.error("Update Error:", e); }
        }

        // スタッフログイン
        function openStaffLogin() { document.getElementById('login-modal').style.display = 'flex'; }
        function closeStaffLogin() { document.getElementById('login-modal').style.display = 'none'; }
        
        async function verifyPassword() {
            const pass = document.getElementById('pass-input').value;
            if (pass === "1234") { // パスワード設定
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('loading-overlay').style.display = 'flex';
                await new Promise(r => setTimeout(r, 1000));
                location.href = 'staff.html';
            } else {
                document.getElementById('error-msg').style.visibility = 'visible';
            }
        }

        setInterval(updateDisplay, 10000);
        updateDisplay();
    </script>
</body>
</html>
