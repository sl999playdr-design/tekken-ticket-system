<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>整理券</title><link rel="stylesheet" href="style.css">
</head>
<body class="ticket-page">
    <div class="ticket-container">
        <div class="ticket-header">N-GAUGE TICKET</div>
        <div class="ticket-id" id="id">---</div>
        <div class="ticket-vehicle" id="v">---</div>
        <p>※この画面をスクリーンショットしてください。</p>
    </div>
    <button onclick="location.href='index.html'">トップへ戻る</button>
    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('id').innerText = p.get('id');
        document.getElementById('v').innerText = p.get('v');
    </script>
</body>
</html>
