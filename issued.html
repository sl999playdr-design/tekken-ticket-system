<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ整理券 - 運行ナビ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f0f0f0; font-family: sans-serif; transition: background 0.3s; margin: 0; overflow-x: hidden; }
        .nav-container { max-width: 500px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; position: relative; z-index: 2; }

        /* 呼出時の背景点滅アニメーション */
        @keyframes calling-flash {
            0% { background-color: #ff9900; }
            50% { background-color: #ffffff; }
            100% { background-color: #ff9900; }
        }
        .is-calling-body {
            animation: calling-flash 0.8s infinite;
        }

        /* 路線図スタイル */
        .route-map { position: relative; margin: 40px 0 40px 60px; border-left: 8px solid #ccc; }
        .station { position: relative; margin-bottom: 60px; padding-left: 20px; }
        .station::before {
            content: ""; position: absolute; left: -34px; top: 5px;
            width: 20px; height: 20px; background: white; border: 4px solid #999; border-radius: 50%;
        }
        .station.current::before { border-color: #e67e22; background: #e67e22; animation: pulse 1.5s infinite; }
        .station.goal::before { border-color: #27ae60; border-radius: 0; transform: rotate(45deg); }
        
        .station-name { font-size: 1.2rem; color: #444; font-weight: bold; }
        .wait-info { font-size: 0.9rem; color: #888; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(230, 126, 34, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0); }
        }

        /* 音声有効化ボタン */
        #audio-unlock {
            background: #27ae60; color: white; border: none; padding: 10px;
            width: 100%; margin-bottom: 15px; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="nav-container">
    <button id="audio-unlock" onclick="unlockAudio()">🔔 通知音を有効にする</button>

    <div style="text-align: center; border-bottom: 2px dashed #ddd; padding-bottom: 20px; margin-bottom: 20px;">
        <div id="disp-id" style="font-size: 4rem; font-weight: bold;">---</div>
        <div id="disp-v" style="background:#333; color:#fff; display:inline-block; padding:5px 15px;">---</div>
    </div>

    <div class="route-map">
        <div id="stat-me" class="station current">
            <div class="station-name">あなたの位置</div>
            <div id="wait-count" class="wait-info">読込中...</div>
        </div>
        <div class="station goal">
            <div class="station-name">運転台</div>
            <div class="wait-info">出発進行</div>
        </div>
    </div>
</div>

<audio id="call-sound" src="call.mp3" preload="auto"></audio>

<script src="script.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const myId = urlParams.get('id');
    const myV = urlParams.get('v');
    document.getElementById('disp-id').innerText = myId;
    document.getElementById('disp-v').innerText = myV;

    let audioUnlocked = false;
    let isCalled = false; // 二重再生防止用

    function unlockAudio() {
        const sound = document.getElementById('call-sound');
        sound.play().then(() => {
            sound.pause();
            sound.currentTime = 0;
            audioUnlocked = true;
            document.getElementById('audio-unlock').style.display = 'none';
        });
    }

    async function updateStatus() {
        try {
            const data = await fetchSheetData();
            const myData = data.find(d => d.id === myId);
            const body = document.body;
            const sound = document.getElementById('call-sound');

            if (myData && myData.status === 'call') {
                // 【呼出中！】
                body.classList.add('is-calling-body');
                document.querySelector('.station-name').innerText = "まもなく発車（受付へ！）";
                
                if (audioUnlocked && !isCalled) {
                    sound.play(); // 音を鳴らす
                    isCalled = true; 
                }
            } else {
                body.classList.remove('is-calling-body');
                isCalled = false;
            }

            // 待ち順計算
            const waitingList = data.filter(d => d.status === 'resep');
            const myIndex = waitingList.findIndex(d => d.id === myId);
            const infoText = document.getElementById('wait-count');
            
            if (myIndex !== -1) {
                infoText.innerText = `前に ${myIndex} 組お待ちです (約 ${myIndex * 5} 分)`;
            } else if (myData && myData.status === 'call') {
                infoText.innerText = "順番が来ました！";
            }

            if (!myData || myData.status === 'end') {
                alert("整理券の有効期限が終了しました。");
                location.href = 'index.html';
            }
        } catch (e) { console.error(e); }
    }

    setInterval(updateStatus, 10000);
    updateStatus();
</script>
</body>
</html>
