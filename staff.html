<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情報統合管理システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #222; color: #ddd; font-family: monospace; margin: 0; }
        .staff-container { max-width: 900px; margin: 0 auto; padding: 10px; }
        .section { border: 1px solid #444; margin-bottom: 20px; background: #000; padding: 15px; }
        .section-title { background: #444; color: #fff; padding: 5px 10px; font-size: 0.9rem; margin: -15px -15px 15px -15px; }
        .issue-form { display: flex; flex-wrap: wrap; gap: 10px; }
        select, button, input { border: 1px solid #666; background: #333; color: #fff; padding: 10px; border-radius: 0; font-size: 1rem; }
        
        /* ボタン色 */
        .btn-call { background: #800; }
        .btn-end { background: #444; }
        .btn-re-call { background: #004488; }

        /* テーブル設定 */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .admin-table th, .admin-table td { border: 1px solid #444; padding: 8px; text-align: left; }
        .admin-table th { background: #111; font-size: 0.8rem; }
        
        .row-calling { background: #221100; color: #ff9900; font-weight: bold; }
        .row-ended { color: #555; }

        /* --- 経過時間のアラートスタイル --- */
        .time-green { color: #00ff00; font-weight: bold; }
        .time-yellow { color: #ffff00; font-weight: bold; }
        .time-red { color: #ff0000; font-weight: bold; }
        
        /* 15分以上：背景黒・文字赤で激しく反転点滅 */
        .time-emergency {
            font-weight: bold;
            animation: emergency-blink 0.5s step-end infinite;
        }

        @keyframes emergency-blink {
            0% { background: #000; color: #ff0000; }
            50% { background: #ff0000; color: #000; }
        }

        /* ローディング */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #f1c40f; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="staff-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span style="font-weight: bold;">[ 情報統合管理システム ]</span>
        <button onclick="location.href='monitor.html'" style="font-size: 0.7rem;">EXIT</button>
    </div>

    <div class="section">
        <div class="section-title">整理券新規発行</div>
        <div class="issue-form">
            <select id="v-select"><option value="">センターと通信中...</option></select>
            <select id="t-select"><option value="S">上級(S)</option><option value="A">普通(A)</option></select>
            <button id="issue-btn" onclick="staffIssue()" style="background: #004400;">発行</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">整理券データ</div>
        <div id="list-container"></div>
    </div>
</div>

<div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div style="color:#f1c40f; margin-top:50px; letter-spacing: 2px;">通信中...</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

    /**
     * 経過時間を計算して表示用テキストとCSSクラスを返す
     */
    function getTimeStyle(dateStr) {
        if (!dateStr) return { text: "--:--", className: "" };
        
        const now = new Date();
        const start = new Date(dateStr);
        const diffMs = now - start;
        
        // 異常な日付（未来など）の場合は計算しない
        if (diffMs < 0) return { text: "0分0秒", className: "time-green" };

        const diffMin = Math.floor(diffMs / 60000);
        const diffSec = Math.floor((diffMs % 60000) / 1000);
        
        const timeText = `${diffMin}分${diffSec}秒`;
        let className = "time-green";

        if (diffMin >= 15) {
            className = "time-emergency";
        } else if (diffMin >= 10) {
            className = "time-red";
        } else if (diffMin >= 5) {
            className = "time-yellow";
        }

        return { text: timeText, className: className };
    }

    async function loadMaster() {
        try {
            const res = await fetch(`${API_URL}?sheet=master`);
            const data = await res.json();
            const select = document.getElementById('v-select');
            if (data.vehicles) {
                select.innerHTML = '';
                data.vehicles.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v; opt.textContent = v;
                    select.appendChild(opt);
                });
            }
        } catch (e) { console.error("Master load error:", e); }
    }

    async function refresh() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const container = document.getElementById('list-container');
            
            // 最新の発行分を上に表示
            const allData = [...data].reverse(); 

            let html = `<table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>車両</th>
                        <th>経過時間</th>
                        <th>状態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>`;

            allData.forEach(d => {
                // スプレッドシートのヘッダー名 'reception' に合わせて取得
                const timeInfo = (d.status !== 'end') ? getTimeStyle(d.reception) : { text: "完了", className: "" };
                
                let actionBtn = "";
                let rowClass = d.status === 'call' ? 'row-calling' : (d.status === 'end' ? 'row-ended' : '');

                if (d.status === 'call') {
                    actionBtn = `<button class="btn-end" onclick="upd('${d.id}', 'end')">終了</button>`;
                } else if (d.status === 'end') {
                    actionBtn = `<button class="btn-re-call" onclick="upd('${d.id}', 'call')">再呼出</button>`;
                } else {
                    actionBtn = `<button class="btn-call" onclick="upd('${d.id}', 'call')">呼出</button>`;
                }

                html += `<tr class="${rowClass}">
                    <td>${d.id}</td>
                    <td>${d.vehicle}</td>
                    <td class="${timeInfo.className}">${timeInfo.text}</td>
                    <td>${d.status.toUpperCase()}</td>
                    <td>${actionBtn}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        } catch (e) { console.error("Refresh error:", e); }
    }

    async function staffIssue() {
        const v = document.getElementById('v-select').value;
        const t = document.getElementById('t-select').value;
        if(!v) { alert("車両を選択してください"); return; }
        
        showLoading(true);
        try {
            await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ action: 'issue', type: t, vehicle: v }) 
            });
            await refresh();
        } catch (e) { alert("通信エラーが発生しました"); }
        showLoading(false);
    }

    async function upd(id, s) {
        showLoading(true);
        try {
            await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ action: 'update', id: id, status: s }) 
            });
            await refresh();
        } catch (e) { alert("更新エラーが発生しました"); }
        showLoading(false);
    }

    function showLoading(show) { 
        document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; 
    }

    // 初期化
    window.addEventListener('load', () => { 
        loadMaster(); 
        refresh(); 
    });

    // 5秒おきに表示を更新（経過時間のカウントアップを反映）
    setInterval(refresh, 5000);
</script>
</body>
</html>
