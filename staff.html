<style>
    /* 処理中を知らせる画面全体のレイヤー */
    #loading-overlay {
        display: none; /* 通常は隠しておく */
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.85); /* 画面を暗くする */
        z-index: 9999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Courier New', monospace;
    }

    .loading-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #333;
        border-top: 5px solid #f1c40f; /* 鉄道の警告色 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
    }

    .loading-text {
        color: #f1c40f;
        font-size: 1.5rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 3px;
        animation: blink 1s step-end infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes blink { 
        0%, 100% { opacity: 1; } 
        50% { opacity: 0; } 
    }
</style>

<div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Communicating...</div>
    <p style="color: #888; margin-top: 15px;">Accessing Spreadsheet Data</p>
</div>

<script>
    async function handleCallRequest(button) {
        // 1. 処理中画面を表示
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';

        try {
            // ここにスプレッドシートへの通信処理を書く
            // fetch("https://script.google.com/...") など
            
            // --- 通信のシミュレーション（実際はここをfetchに置き換えます） ---
            await new Promise(resolve => setTimeout(resolve, 3000)); 
            // ---------------------------------------------------------

            // 通信成功後の処理
            document.getElementById('currentStatus').innerText = "CALL";
            document.getElementById('currentStatus').style.color = "#e74c3c"; // 赤に変更
            
        } catch (error) {
            console.error("Communication error:", error);
            alert("信号受信に失敗しました。");
        } finally {
            // 2. 処理が終わったら（成功しても失敗しても）画面を戻す
            overlay.style.display = 'none';
        }
    }
</script>
