<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAFF ONLY - 運行管理</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 無骨なUIのための上書き設定 */
        body { display: none; background: #222; color: #ddd; font-family: monospace; margin: 0; }
        .staff-container { max-width: 800px; margin: 0 auto; padding: 10px; }
        
        /* セクション区切り */
        .section { border: 1px solid #444; margin-bottom: 20px; background: #000; padding: 15px; }
        .section-title { background: #444; color: #fff; padding: 5px 10px; font-size: 0.9rem; margin: -15px -15px 15px -15px; }

        /* 発行フォーム（装飾排除） */
        .issue-form { display: flex; flex-wrap: wrap; gap: 10px; }
        select, button, input { border: 1px solid #666; background: #333; color: #fff; padding: 10px; border-radius: 0 !important; font-size: 1rem; }
        button { cursor: pointer; text-transform: uppercase; }
        button:active { background: #555; }
        .btn-call { background: #800; } /* 控えめな赤 */
        .btn-end { background: #444; }

        /* リスト表示 */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .admin-table th, .admin-table td { border: 1px solid #444; padding: 8px; text-align: left; }
        .admin-table th { background: #111; font-size: 0.8rem; }
        
        /* 呼出中行の強調 */
        .row-calling { background: #221100; color: #ff9900; }
    </style>
</head>
<body class="staff-mode">

<div class="staff-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span style="font-weight: bold;">[ SYSTEM TERMINAL - STAFF ONLY ]</span>
        <button onclick="location.href='index.html'" style="font-size: 0.7rem;">EXIT</button>
    </div>

    <div class="section">
        <div class="section-title">QUICK ISSUE (新規発行)</div>
        <div class="issue-form">
            <select id="v-select">
                <option value="E5系 はやぶさ">E5系 はやぶさ</option>
                <option value="E235系 山手線">E235系 山手線</option>
                <option value="923形 ドクターイエロー">923形 ドクターイエロー</option>
                <option value="N700S のぞみ">N700S のぞみ</option>
            </select>
            <select id="t-select">
                <option value="S">特別(S)</option>
                <option value="A">普通(A)</option>
            </select>
            <button id="issue-btn" onclick="staffIssue()" style="background: #004400;">発行実行</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">RESERVATION LIST (予約・呼出管理)</div>
        <div id="list-container">
            </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    // --- 認証 ---
    const PIN = "0000";
    if (prompt("ENTER PIN") === PIN) {
        document.body.style.display = "block";
    } else {
        location.href = "index.html";
    }

    // --- スタッフ側からの新規発行 ---
    async function staffIssue() {
        const btn = document.getElementById('issue-btn');
        const v = document.getElementById('v-select').value;
        const t = document.getElementById('t-select').value;
        
        btn.disabled = true;
        btn.innerText = "WAIT...";
        
        try {
            const res = await postToSheet({ action: 'issue', type: t, vehicle: v });
            if(res.result === 'success') {
                alert("発行完了: " + res.id);
                refresh();
            }
        } catch (e) { alert("ERROR"); }
        
        btn.disabled = false;
        btn.innerText = "発行実行";
    }

    // --- リスト更新 ---
    async function refresh() {
        try {
            const data = await fetchSheetData();
            const container = document.getElementById('list-container');
            
            // 終了分を除外
            const activeData = data.filter(d => d.status !== 'end');

            let html = `<table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>車両</th>
                        <th>状態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>`;

            activeData.forEach(d => {
                const isCalling = d.status === 'call';
                html += `<tr class="${isCalling ? 'row-calling' : ''}">
                    <td>${d.id}</td>
                    <td>${d.vehicle}</td>
                    <td>${isCalling ? 'CALL' : '-'}</td>
                    <td>
                        ${!isCalling ? 
                            `<button class="btn-call" onclick="upd('${d.id}', 'call')">呼出</button>` : 
                            `<button class="btn-end" onclick="upd('${d.id}', 'end')">終了</button>`
                        }
                    </td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = activeData.length ? html : "NO DATA";

        } catch (e) { console.error(e); }
    }

    async function upd(id, s) {
        await postToSheet({ action: 'update', id: id, status: s });
        refresh();
    }

    setInterval(refresh, 10000);
    refresh();
</script>
</body>
</html>
