<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>管理コンソール</title><link rel="stylesheet" href="style.css">
</head>
<body class="staff-mode">
    <header><h1>運行管理</h1><button onclick="location.href='index.html'">モニターへ</button></header>
    <div class="staff-grid">
        <section class="panel">
            <h2>🎫 代行発行</h2>
            <select id="v-select" class="large-select">
                <option value="E5系">E5系</option><option value="E235系">E235系</option>
            </select>
            <button onclick="issue('S')" class="btn-primary-s">特別(S)発行</button>
            <button onclick="issue('A')" class="btn-primary-a">普通(A)発行</button>
        </section>
        <section class="panel">
            <h2>📋 呼出管理</h2>
            <div id="list">読込中...</div>
        </section>
    </div>
    <script src="script.js"></script>
    <script>
        async function issue(t) {
            const v = document.getElementById('v-select').value;
            const res = await postToSheet({ action: 'issue', type: t, vehicle: v });
            if(res.result === 'success') { alert("発行成功: " + res.id); refresh(); }
        }
        async function refresh() {
            const data = await fetchSheetData();
            const active = data.filter(d => d.status !== 'end');
            document.getElementById('list').innerHTML = active.map(d => `
                <div class="list-item">
                    ${d.id} (${d.vehicle}) [${d.status}]
                    <button onclick="upd('${d.id}','call')">呼出</button>
                    <button onclick="upd('${d.id}','end')">終了</button>
                </div>
            `).join('');
        }
        async function upd(id, s) { await postToSheet({ action:'update', id:id, status:s }); refresh(); }
        refresh(); setInterval(refresh, 15000);
    </script>
</body>
</html>
